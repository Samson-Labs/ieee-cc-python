name: PROD - CD Promote + Deploy to Lambda

on:
  workflow_dispatch:
    inputs:
      pdf_extractor_tag:
        description: "Tag in DEV ieee-cc-pdf-extractor to promote & deploy to PROD (e.g. a1b2c3d or latest)"
        required: false
        type: string
      deploy_pdf_extractor:
        description: "Promote & deploy pdf-extractor?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

      image_overlay_tag:
        description: "Tag in DEV ieee-rc-image-generator to promote & deploy to PROD"
        required: false
        type: string
      deploy_image_overlay:
        description: "Promote & deploy image-overlay?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

      bedrock_tag:
        description: "Tag in DEV ieee-cc-bedrock-inference to promote & deploy to PROD"
        required: false
        type: string
      deploy_bedrock:
        description: "Promote & deploy bedrock-inference?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

      video_transcriber_tag:
        description: "Tag in DEV ieee-cc-video-transcriber to promote & deploy to PROD"
        required: false
        type: string
      deploy_video_transcriber:
        description: "Promote & deploy video-transcriber?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

      ai_orchestrator_tag:
        description: "Tag in DEV ieee-rc-ai-orchestrator to promote & deploy to PROD"
        required: false
        type: string
      deploy_ai_orchestrator:
        description: "Promote & deploy ai-orchestrator?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

      dlq_processor_tag:
        description: "Tag in DEV ieee-rc-dlq-processor to promote & deploy to PROD"
        required: false
        type: string
      deploy_dlq_processor:
        description: "Promote & deploy dlq-processor?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

      bulk_processor_tag:
        description: "Tag in DEV ieee-rc-bulk-processor to promote & deploy to PROD"
        required: false
        type: string
      deploy_bulk_processor:
        description: "Promote & deploy bulk-processor?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

      bulk_worker_tag:
        description: "Tag in DEV ieee-rc-bulk-worker to promote & deploy to PROD"
        required: false
        type: string
      deploy_bulk_worker:
        description: "Promote & deploy bulk-worker?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

      wizard_transfer_tag:
        description: "Tag in DEV ieee-rc-wizard-transfer to promote & deploy to PROD"
        required: false
        type: string
      deploy_wizard_transfer:
        description: "Promote & deploy wizard-transfer?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

      pptx_extractor_tag:
        description: "Tag in DEV ieee-rc-pptx-extractor to promote & deploy to PROD"
        required: false
        type: string
      deploy_pptx_extractor:
        description: "Promote & deploy pptx-extractor?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

concurrency:
  group: cd-deploy-prod
  cancel-in-progress: false  # never cancel an in-flight deploy

jobs:
  promote-and-deploy:
    name: Promote DEV images to PROD ECR & deploy to PROD Lambdas
    runs-on: [self-hosted, cc3]
    if: github.event_name == 'workflow_dispatch'

    env:
      AWS_REGION: "us-east-1"
      AWS_DEFAULT_REGION: "us-east-1"
      ACCOUNT_ID: "141770997341"

      # DEV ECR repos (CI pushes here)
      DEV_ECR_PDF_EXTRACTOR:     "ieee-cc-pdf-extractor"
      DEV_ECR_IMAGE_OVERLAY:     "ieee-rc-image-generator"
      DEV_ECR_BEDROCK:           "ieee-cc-bedrock-inference"
      DEV_ECR_VIDEO_TRANSCRIBER: "ieee-cc-video-transcriber"
      DEV_ECR_AI_ORCHESTRATOR:   "ieee-rc-ai-orchestrator"
      DEV_ECR_DLQ_PROCESSOR:     "ieee-rc-dlq-processor"
      DEV_ECR_BULK_PROCESSOR:    "ieee-rc-bulk-processor"
      DEV_ECR_BULK_WORKER:       "ieee-rc-bulk-worker"
      DEV_ECR_WIZARD_TRANSFER:   "ieee-rc-wizard-transfer"
      DEV_ECR_PPTX_EXTRACTOR:    "ieee-rc-pptx-extractor"

      # PROD ECR repos (promote target)
      PROD_ECR_PDF_EXTRACTOR:     "ieee-cc-pdf-extractor-prod"
      PROD_ECR_IMAGE_OVERLAY:     "ieee-rc-image-generator-prod"
      PROD_ECR_BEDROCK:           "ieee-cc-bedrock-inference-prod"
      PROD_ECR_VIDEO_TRANSCRIBER: "ieee-cc-video-transcriber-prod"
      PROD_ECR_AI_ORCHESTRATOR:   "ieee-rc-ai-orchestrator-prod"
      PROD_ECR_DLQ_PROCESSOR:     "ieee-rc-dlq-processor-prod"
      PROD_ECR_BULK_PROCESSOR:    "ieee-rc-bulk-processor-prod"
      PROD_ECR_BULK_WORKER:       "ieee-rc-bulk-worker-prod"
      PROD_ECR_WIZARD_TRANSFER:   "ieee-rc-wizard-transfer-prod"
      PROD_ECR_PPTX_EXTRACTOR:    "ieee-rc-pptx-extractor-prod"

      PDF_EXTRACTOR_TAG:      ${{ github.event.inputs.pdf_extractor_tag }}
      PDF_EXTRACTOR_FLAG:     ${{ github.event.inputs.deploy_pdf_extractor }}
      IMAGE_OVERLAY_TAG:      ${{ github.event.inputs.image_overlay_tag }}
      IMAGE_OVERLAY_FLAG:     ${{ github.event.inputs.deploy_image_overlay }}
      BEDROCK_TAG:            ${{ github.event.inputs.bedrock_tag }}
      BEDROCK_FLAG:           ${{ github.event.inputs.deploy_bedrock }}
      VIDEO_TRANSCRIBER_TAG:  ${{ github.event.inputs.video_transcriber_tag }}
      VIDEO_TRANSCRIBER_FLAG: ${{ github.event.inputs.deploy_video_transcriber }}
      AI_ORCHESTRATOR_TAG:    ${{ github.event.inputs.ai_orchestrator_tag }}
      AI_ORCHESTRATOR_FLAG:   ${{ github.event.inputs.deploy_ai_orchestrator }}
      DLQ_PROCESSOR_TAG:      ${{ github.event.inputs.dlq_processor_tag }}
      DLQ_PROCESSOR_FLAG:     ${{ github.event.inputs.deploy_dlq_processor }}
      BULK_PROCESSOR_TAG:     ${{ github.event.inputs.bulk_processor_tag }}
      BULK_PROCESSOR_FLAG:    ${{ github.event.inputs.deploy_bulk_processor }}
      BULK_WORKER_TAG:        ${{ github.event.inputs.bulk_worker_tag }}
      BULK_WORKER_FLAG:       ${{ github.event.inputs.deploy_bulk_worker }}
      WIZARD_TRANSFER_TAG:    ${{ github.event.inputs.wizard_transfer_tag }}
      WIZARD_TRANSFER_FLAG:   ${{ github.event.inputs.deploy_wizard_transfer }}
      PPTX_EXTRACTOR_TAG:     ${{ github.event.inputs.pptx_extractor_tag }}
      PPTX_EXTRACTOR_FLAG:    ${{ github.event.inputs.deploy_pptx_extractor }}

    steps:
      - name: Start summary
        run: |
          set -euo pipefail
          {
            echo "## PROD - Promotion and Deployment (DEV ECR → PROD ECR → PROD Lambda)"
            echo ""
            echo "**Branch**: \`${GITHUB_REF_NAME}\`  |  **Actor**: \`${{ github.actor }}\`"
            echo ""
            echo "| Service | Promote & Deploy? | Tag |"
            echo "|---------|-------------------|-----|"
            echo "| pdf-extractor | \`${PDF_EXTRACTOR_FLAG}\` | \`${PDF_EXTRACTOR_TAG:-<none>}\` |"
            echo "| image-overlay | \`${IMAGE_OVERLAY_FLAG}\` | \`${IMAGE_OVERLAY_TAG:-<none>}\` |"
            echo "| bedrock-inference | \`${BEDROCK_FLAG}\` | \`${BEDROCK_TAG:-<none>}\` |"
            echo "| video-transcriber | \`${VIDEO_TRANSCRIBER_FLAG}\` | \`${VIDEO_TRANSCRIBER_TAG:-<none>}\` |"
            echo "| ai-orchestrator | \`${AI_ORCHESTRATOR_FLAG}\` | \`${AI_ORCHESTRATOR_TAG:-<none>}\` |"
            echo "| dlq-processor | \`${DLQ_PROCESSOR_FLAG}\` | \`${DLQ_PROCESSOR_TAG:-<none>}\` |"
            echo "| bulk-processor | \`${BULK_PROCESSOR_FLAG}\` | \`${BULK_PROCESSOR_TAG:-<none>}\` |"
            echo "| bulk-worker | \`${BULK_WORKER_FLAG}\` | \`${BULK_WORKER_TAG:-<none>}\` |"
            echo "| wizard-transfer | \`${WIZARD_TRANSFER_FLAG}\` | \`${WIZARD_TRANSFER_TAG:-<none>}\` |"
            echo "| pptx-extractor | \`${PPTX_EXTRACTOR_FLAG}\` | \`${PPTX_EXTRACTOR_TAG:-<none>}\` |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Show AWS identity
        run: |
          set -euo pipefail
          aws sts get-caller-identity

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: private
          mask-password: true
          skip-logout: false

      - name: Promote & deploy
        id: promote-deploy
        run: |
          set -euo pipefail

          IMAGE_RESULTS_FILE="prod_image_results.txt"
          LAMBDA_RESULTS_FILE="prod_lambda_results.txt"
          : > "$IMAGE_RESULTS_FILE"
          : > "$LAMBDA_RESULTS_FILE"

          BASE="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          promote_and_deploy() {
            local DEV_REPO="$1"
            local PROD_REPO="$2"
            local LAMBDA_NAME="$3"
            local TAG="$4"
            local FLAG="$5"
            local LABEL="$6"

            if [[ "${FLAG}" == "no" ]]; then
              echo "${PROD_REPO} -> SKIPPED (flag=no)" | tee -a "$IMAGE_RESULTS_FILE"
              echo "${LAMBDA_NAME} -> SKIPPED (flag=no)" | tee -a "$LAMBDA_RESULTS_FILE"
              return
            fi

            if [[ -z "${TAG:-}" ]]; then
              echo "ERROR: promote flag is yes for ${LABEL} but tag is empty." >&2
              exit 1
            fi

            local DEV_URI="${BASE}/${DEV_REPO}:${TAG}"
            local PROD_URI="${BASE}/${PROD_REPO}:${TAG}"
            local PROD_LATEST="${BASE}/${PROD_REPO}:latest"

            echo "=== ${LABEL} ==="
            echo "Pulling  : ${DEV_URI}"
            docker pull "${DEV_URI}"

            echo "Tagging  : ${PROD_URI}"
            docker tag "${DEV_URI}" "${PROD_URI}"
            docker tag "${DEV_URI}" "${PROD_LATEST}"

            echo "Pushing  : ${PROD_URI}"
            docker push "${PROD_URI}"
            docker push "${PROD_LATEST}"

            echo "${PROD_REPO} -> PROMOTED from ${DEV_REPO} (tag=${TAG}, latest updated)" | tee -a "$IMAGE_RESULTS_FILE"

            echo "Deploying: ${PROD_URI} → ${LAMBDA_NAME}"
            aws lambda update-function-code \
              --function-name "${LAMBDA_NAME}" \
              --image-uri "${PROD_URI}" \
              --region "${AWS_REGION}"

            echo "${LAMBDA_NAME} -> OK (tag=${TAG})" | tee -a "$LAMBDA_RESULTS_FILE"
          }

          promote_and_deploy "${DEV_ECR_PDF_EXTRACTOR}"     "${PROD_ECR_PDF_EXTRACTOR}"     "ieee-cc-pdf-extractor-prod"     "${PDF_EXTRACTOR_TAG:-}"     "${PDF_EXTRACTOR_FLAG}"     "pdf-extractor"
          promote_and_deploy "${DEV_ECR_IMAGE_OVERLAY}"     "${PROD_ECR_IMAGE_OVERLAY}"     "ieee-rc-image-generator-prod"   "${IMAGE_OVERLAY_TAG:-}"     "${IMAGE_OVERLAY_FLAG}"     "image-overlay"
          promote_and_deploy "${DEV_ECR_BEDROCK}"           "${PROD_ECR_BEDROCK}"           "ieee-cc-bedrock-inference-prod" "${BEDROCK_TAG:-}"           "${BEDROCK_FLAG}"           "bedrock-inference"
          promote_and_deploy "${DEV_ECR_VIDEO_TRANSCRIBER}" "${PROD_ECR_VIDEO_TRANSCRIBER}" "ieee-cc-video-transcriber-prod" "${VIDEO_TRANSCRIBER_TAG:-}" "${VIDEO_TRANSCRIBER_FLAG}" "video-transcriber"
          promote_and_deploy "${DEV_ECR_AI_ORCHESTRATOR}"   "${PROD_ECR_AI_ORCHESTRATOR}"   "ieee-rc-ai-orchestrator-prod"   "${AI_ORCHESTRATOR_TAG:-}"   "${AI_ORCHESTRATOR_FLAG}"   "ai-orchestrator"
          promote_and_deploy "${DEV_ECR_DLQ_PROCESSOR}"     "${PROD_ECR_DLQ_PROCESSOR}"     "ieee-rc-dlq-processor-prod"     "${DLQ_PROCESSOR_TAG:-}"     "${DLQ_PROCESSOR_FLAG}"     "dlq-processor"
          promote_and_deploy "${DEV_ECR_BULK_PROCESSOR}"    "${PROD_ECR_BULK_PROCESSOR}"    "ieee-rc-bulk-processor-prod"    "${BULK_PROCESSOR_TAG:-}"    "${BULK_PROCESSOR_FLAG}"    "bulk-processor"
          promote_and_deploy "${DEV_ECR_BULK_WORKER}"       "${PROD_ECR_BULK_WORKER}"       "ieee-rc-bulk-worker-prod"       "${BULK_WORKER_TAG:-}"       "${BULK_WORKER_FLAG}"       "bulk-worker"
          promote_and_deploy "${DEV_ECR_WIZARD_TRANSFER}"   "${PROD_ECR_WIZARD_TRANSFER}"   "ieee-rc-wizard-transfer-prod"   "${WIZARD_TRANSFER_TAG:-}"   "${WIZARD_TRANSFER_FLAG}"   "wizard-transfer"
          promote_and_deploy "${DEV_ECR_PPTX_EXTRACTOR}"    "${PROD_ECR_PPTX_EXTRACTOR}"    "ieee-rc-pptx-extractor-prod"    "${PPTX_EXTRACTOR_TAG:-}"    "${PPTX_EXTRACTOR_FLAG}"    "pptx-extractor"

          echo "IMAGE_RESULTS_FILE=${IMAGE_RESULTS_FILE}" >> "$GITHUB_ENV"
          echo "LAMBDA_RESULTS_FILE=${LAMBDA_RESULTS_FILE}" >> "$GITHUB_ENV"

      - name: Docker cleanup
        if: always()
        run: |
          docker image prune -af || true
          docker builder prune -af || true

      - name: Write deployment summary
        if: always()
        run: |
          set -euo pipefail

          IMAGE_RESULTS_FILE="${IMAGE_RESULTS_FILE:-prod_image_results.txt}"
          LAMBDA_RESULTS_FILE="${LAMBDA_RESULTS_FILE:-prod_lambda_results.txt}"

          {
            echo "### PROD Image Promotion Summary"
            echo ""
            echo "| ECR Repository | Status |"
            echo "|----------------|--------|"
            if [[ -f "${IMAGE_RESULTS_FILE}" ]]; then
              while IFS= read -r line; do
                NAME=$(echo "${line}" | cut -d' ' -f1)
                STATUS=$(echo "${line}" | cut -d'>' -f2- | xargs)
                echo "| \`${NAME}\` | ${STATUS} |"
              done < "${IMAGE_RESULTS_FILE}"
            else
              echo "| (none) | no results file found |"
            fi

            echo ""
            echo "### PROD Lambda Deployment Summary"
            echo ""
            echo "| Lambda | Status |"
            echo "|--------|--------|"
            if [[ -f "${LAMBDA_RESULTS_FILE}" ]]; then
              while IFS= read -r line; do
                NAME=$(echo "${line}" | cut -d' ' -f1)
                STATUS=$(echo "${line}" | cut -d'>' -f2- | xargs)
                echo "| \`${NAME}\` | ${STATUS} |"
              done < "${LAMBDA_RESULTS_FILE}"
            else
              echo "| (none) | no results file found |"
            fi

            echo ""
            echo "> Check the [Lambda console](https://us-east-1.console.aws.amazon.com/lambda/home?region=us-east-1#/functions) to verify."
          } >> "$GITHUB_STEP_SUMMARY"
