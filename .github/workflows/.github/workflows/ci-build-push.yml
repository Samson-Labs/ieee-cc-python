name: CI - Build & Push Docker Images to ECR

on:
  push:
    branches:
      - development
    paths:
      - "**/*.py"
      - "src/**"
      - "**/Dockerfile"
      - "**/requirements*.txt"
  workflow_dispatch: {}

# -------------------------------------------------------------------------
# CONCURRENCY STRATEGY
# On 'main': ANY new push cancels previous running builds on main.
# On other branches: cancellation only for same user + same branch.
# -------------------------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref != 'refs/heads/main' && github.actor || 'global' }}
  cancel-in-progress: true

env:
  AWS_REGION: "us-east-1"
  ACCOUNT_ID: "141770997341"

  ECR_PDF_EXTRACTOR:    "ieee-cc-pdf-extractor"
  ECR_IMAGE_OVERLAY:    "ieee-rc-image-generator"
  ECR_BEDROCK:          "ieee-cc-bedrock-inference"
  ECR_VIDEO_TRANSCRIBER: "ieee-cc-video-transcriber"
  ECR_AI_ORCHESTRATOR:  "ieee-rc-ai-orchestrator"

jobs:
  test:
    name: Test & Lint
    runs-on: [self-hosted, cc3]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt flake8

      - name: Lint
        run: flake8 src/ tests/ --max-line-length=120 --ignore=E501,W503

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  build-and-push:
    name: Build and Push Docker images
    runs-on: [self-hosted, cc3]
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Debug Docker & AWS identity
        run: |
          set -euo pipefail
          echo "=== PWD ==="
          pwd
          echo "=== ls ==="
          ls -la
          echo ""
          echo "=== Docker version ==="
          docker version
          echo ""
          echo "=== AWS identity ==="
          aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: private
          mask-password: true
          skip-logout: false

      # -------------------------------------------------
      # 1) pdf-extractor
      # -------------------------------------------------
      - name: Build & push pdf-extractor (ieee-cc-pdf-extractor)
        id: build-pdf-extractor
        run: |
          set -euo pipefail

          IMAGE_TAG="${GITHUB_SHA::7}"
          BASE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_PDF_EXTRACTOR}"
          IMAGE_URI="${BASE_URI}:${IMAGE_TAG}"
          LATEST_URI="${BASE_URI}:latest"

          echo "PDF_EXTRACTOR_IMAGE_TAG=${IMAGE_TAG}"   >> "$GITHUB_ENV"
          echo "PDF_EXTRACTOR_IMAGE_URI=${IMAGE_URI}"   >> "$GITHUB_ENV"
          echo "PDF_EXTRACTOR_LATEST_URI=${LATEST_URI}" >> "$GITHUB_ENV"

          docker build -f src/extractors/Dockerfile -t "${IMAGE_URI}" .
          docker tag "${IMAGE_URI}" "${LATEST_URI}"
          docker push "${IMAGE_URI}"
          docker push "${LATEST_URI}"

          aws lambda update-function-code \
            --function-name ieee-cc-pdf-extractor \
            --region "${AWS_REGION}" \
            --image-uri "${LATEST_URI}"
          aws lambda wait function-updated-v2 \
            --function-name ieee-cc-pdf-extractor \
            --region "${AWS_REGION}"

      # -------------------------------------------------
      # 2) image-overlay
      # -------------------------------------------------
      - name: Build & push image-overlay (ieee-rc-image-generator)
        id: build-image-overlay
        run: |
          set -euo pipefail

          IMAGE_TAG="${GITHUB_SHA::7}"
          BASE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_IMAGE_OVERLAY}"
          IMAGE_URI="${BASE_URI}:${IMAGE_TAG}"
          LATEST_URI="${BASE_URI}:latest"

          echo "IMAGE_OVERLAY_IMAGE_TAG=${IMAGE_TAG}"   >> "$GITHUB_ENV"
          echo "IMAGE_OVERLAY_IMAGE_URI=${IMAGE_URI}"   >> "$GITHUB_ENV"
          echo "IMAGE_OVERLAY_LATEST_URI=${LATEST_URI}" >> "$GITHUB_ENV"

          docker build -f src/generators/Dockerfile -t "${IMAGE_URI}" .
          docker tag "${IMAGE_URI}" "${LATEST_URI}"
          docker push "${IMAGE_URI}"
          docker push "${LATEST_URI}"

          aws lambda update-function-code \
            --function-name ieee-rc-image-generator \
            --region "${AWS_REGION}" \
            --image-uri "${LATEST_URI}"
          aws lambda wait function-updated-v2 \
            --function-name ieee-rc-image-generator \
            --region "${AWS_REGION}"

      # -------------------------------------------------
      # 3) bedrock-inference
      # -------------------------------------------------
      - name: Build & push bedrock-inference (ieee-cc-bedrock-inference)
        id: build-bedrock
        run: |
          set -euo pipefail

          IMAGE_TAG="${GITHUB_SHA::7}"
          BASE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_BEDROCK}"
          IMAGE_URI="${BASE_URI}:${IMAGE_TAG}"
          LATEST_URI="${BASE_URI}:latest"

          echo "BEDROCK_IMAGE_TAG=${IMAGE_TAG}"   >> "$GITHUB_ENV"
          echo "BEDROCK_IMAGE_URI=${IMAGE_URI}"   >> "$GITHUB_ENV"
          echo "BEDROCK_LATEST_URI=${LATEST_URI}" >> "$GITHUB_ENV"

          docker build -f src/ai/Dockerfile -t "${IMAGE_URI}" .
          docker tag "${IMAGE_URI}" "${LATEST_URI}"
          docker push "${IMAGE_URI}"
          docker push "${LATEST_URI}"

          aws lambda update-function-code \
            --function-name ieee-cc-bedrock-inference \
            --region "${AWS_REGION}" \
            --image-uri "${LATEST_URI}"
          aws lambda wait function-updated-v2 \
            --function-name ieee-cc-bedrock-inference \
            --region "${AWS_REGION}"

      # -------------------------------------------------
      # 4) video-transcriber
      # -------------------------------------------------
      - name: Build & push video-transcriber (ieee-cc-video-transcriber)
        id: build-video-transcriber
        run: |
          set -euo pipefail

          IMAGE_TAG="${GITHUB_SHA::7}"
          BASE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_VIDEO_TRANSCRIBER}"
          IMAGE_URI="${BASE_URI}:${IMAGE_TAG}"
          LATEST_URI="${BASE_URI}:latest"

          echo "VIDEO_TRANSCRIBER_IMAGE_TAG=${IMAGE_TAG}"   >> "$GITHUB_ENV"
          echo "VIDEO_TRANSCRIBER_IMAGE_URI=${IMAGE_URI}"   >> "$GITHUB_ENV"
          echo "VIDEO_TRANSCRIBER_LATEST_URI=${LATEST_URI}" >> "$GITHUB_ENV"

          docker build -f src/extractors/VideoTranscriberDockerfile -t "${IMAGE_URI}" .
          docker tag "${IMAGE_URI}" "${LATEST_URI}"
          docker push "${IMAGE_URI}"
          docker push "${LATEST_URI}"

          aws lambda update-function-code \
            --function-name ieee-cc-video-transcriber \
            --region "${AWS_REGION}" \
            --image-uri "${LATEST_URI}"
          aws lambda wait function-updated-v2 \
            --function-name ieee-cc-video-transcriber \
            --region "${AWS_REGION}"

      # -------------------------------------------------
      # 5) ai-orchestrator
      # -------------------------------------------------
      - name: Build & push ai-orchestrator (ieee-rc-ai-orchestrator)
        id: build-ai-orchestrator
        run: |
          set -euo pipefail

          IMAGE_TAG="${GITHUB_SHA::7}"
          BASE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_AI_ORCHESTRATOR}"
          IMAGE_URI="${BASE_URI}:${IMAGE_TAG}"
          LATEST_URI="${BASE_URI}:latest"

          echo "AI_ORCHESTRATOR_IMAGE_TAG=${IMAGE_TAG}"   >> "$GITHUB_ENV"
          echo "AI_ORCHESTRATOR_IMAGE_URI=${IMAGE_URI}"   >> "$GITHUB_ENV"
          echo "AI_ORCHESTRATOR_LATEST_URI=${LATEST_URI}" >> "$GITHUB_ENV"

          docker build -f src/orchestrator/AIOrchestratorDockerfile -t "${IMAGE_URI}" .
          docker tag "${IMAGE_URI}" "${LATEST_URI}"
          docker push "${IMAGE_URI}"
          docker push "${LATEST_URI}"

          aws lambda update-function-code \
            --function-name ieee-rc-ai-orchestrator \
            --region "${AWS_REGION}" \
            --image-uri "${LATEST_URI}"
          aws lambda wait function-updated-v2 \
            --function-name ieee-rc-ai-orchestrator \
            --region "${AWS_REGION}"

      # -------------------------------------------------
      # CI Summary
      # -------------------------------------------------
      - name: CI summary
        run: |
          set -euo pipefail

          {
            echo "## CI Build Summary"
            echo ""
            echo "**Commit** : \`${GITHUB_SHA}\`"
            echo "**Branch** : \`${GITHUB_REF_NAME}\`"
            echo ""

            echo "### pdf-extractor"
            echo "ECR repo         : \`${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_PDF_EXTRACTOR}\`"
            echo "Image tag        : \`${PDF_EXTRACTOR_IMAGE_TAG:-<unknown>}\`"
            echo "Image URI (sha)  : \`${PDF_EXTRACTOR_IMAGE_URI:-n/a}\`"
            echo "Image URI (latest): \`${PDF_EXTRACTOR_LATEST_URI:-n/a}\`"
            echo ""

            echo "### image-overlay"
            echo "ECR repo         : \`${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_IMAGE_OVERLAY}\`"
            echo "Image tag        : \`${IMAGE_OVERLAY_IMAGE_TAG:-<unknown>}\`"
            echo "Image URI (sha)  : \`${IMAGE_OVERLAY_IMAGE_URI:-n/a}\`"
            echo "Image URI (latest): \`${IMAGE_OVERLAY_LATEST_URI:-n/a}\`"
            echo ""

            echo "### bedrock-inference"
            echo "ECR repo         : \`${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_BEDROCK}\`"
            echo "Image tag        : \`${BEDROCK_IMAGE_TAG:-<unknown>}\`"
            echo "Image URI (sha)  : \`${BEDROCK_IMAGE_URI:-n/a}\`"
            echo "Image URI (latest): \`${BEDROCK_LATEST_URI:-n/a}\`"
            echo ""

            echo "### video-transcriber"
            echo "ECR repo         : \`${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_VIDEO_TRANSCRIBER}\`"
            echo "Image tag        : \`${VIDEO_TRANSCRIBER_IMAGE_TAG:-<unknown>}\`"
            echo "Image URI (sha)  : \`${VIDEO_TRANSCRIBER_IMAGE_URI:-n/a}\`"
            echo "Image URI (latest): \`${VIDEO_TRANSCRIBER_LATEST_URI:-n/a}\`"
            echo ""

            echo "### ai-orchestrator"
            echo "ECR repo         : \`${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_AI_ORCHESTRATOR}\`"
            echo "Image tag        : \`${AI_ORCHESTRATOR_IMAGE_TAG:-<unknown>}\`"
            echo "Image URI (sha)  : \`${AI_ORCHESTRATOR_IMAGE_URI:-n/a}\`"
            echo "Image URI (latest): \`${AI_ORCHESTRATOR_LATEST_URI:-n/a}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # -------------------------------------------------
      # Cleanup
      # -------------------------------------------------
      - name: Docker cleanup
        if: always()
        run: |
          echo "Pruning unused docker images and build cache..."
          docker image prune -af || true
          docker builder prune -af || true
