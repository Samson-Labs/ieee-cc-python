name: CI - Build & Push Docker Images to ECR

on:
  push:
    branches:
      - development
      - main
    paths:
      - "**/*.py"
      - "src/**"
      - "**/Dockerfile*"
      - "**/requirements*.txt"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force rebuild all images even if no source changes detected"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

# -------------------------------------------------------------------------
# CONCURRENCY STRATEGY
# On 'main': ANY new push cancels previous running builds on main.
# On other branches: cancellation only for same user + same branch.
# -------------------------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.ref != 'refs/heads/main' && github.actor || 'global' }}
  cancel-in-progress: true

env:
  AWS_REGION: "us-east-1"
  AWS_DEFAULT_REGION: "us-east-1"
  ACCOUNT_ID: "141770997341"

jobs:
  test:
    name: Test & Lint
    runs-on: [self-hosted, cc3]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: flake8 src/ tests/

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  build-and-push:
    name: Build & Push ${{ matrix.name }}
    runs-on: [self-hosted, cc3]
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: pdf-extractor
            ecr_repo: ieee-cc-pdf-extractor
            dockerfile: src/extractors/Dockerfile
            src_path: src/extractors

          - name: image-overlay
            ecr_repo: ieee-rc-image-generator
            dockerfile: src/generators/Dockerfile
            src_path: src/generators

          - name: bedrock-inference
            ecr_repo: ieee-cc-bedrock-inference
            dockerfile: src/ai/Dockerfile
            src_path: src/ai

          - name: video-transcriber
            ecr_repo: ieee-cc-video-transcriber
            dockerfile: src/extractors/VideoTranscriberDockerfile
            src_path: src/extractors

          - name: ai-orchestrator
            ecr_repo: ieee-rc-ai-orchestrator
            dockerfile: src/orchestrator/AIOrchestratorDockerfile
            src_path: src/orchestrator

          - name: dlq-processor
            ecr_repo: ieee-rc-dlq-processor
            dockerfile: src/dlq/Dockerfile
            src_path: src/dlq

          - name: bulk-processor
            ecr_repo: ieee-rc-bulk-processor
            dockerfile: src/bulk/Dockerfile.processor
            src_path: src/bulk

          - name: bulk-worker
            ecr_repo: ieee-rc-bulk-worker
            dockerfile: src/bulk/Dockerfile.worker
            src_path: src/bulk

          - name: wizard-transfer
            ecr_repo: ieee-rc-wizard-transfer
            dockerfile: src/transfer/Dockerfile
            src_path: src/transfer

          - name: pptx-extractor
            ecr_repo: ieee-rc-pptx-extractor
            dockerfile: src/extractors/PPTXExtractorDockerfile
            src_path: src/extractors

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Detect relevant changes
        id: changed
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.force_rebuild }}" == "true" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE="${{ github.event.before }}"
          # Handle first push on a new branch (all-zeros SHA)
          if [[ "${BASE}" == "0000000000000000000000000000000000000000" ]]; then
            BASE="HEAD~1"
          fi
          if git diff --name-only "${BASE}" HEAD | grep -qE "^(${{ matrix.src_path }}/|src/common/|src/handlers/|requirements.*\.txt|${{ matrix.dockerfile }})"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug Docker & AWS identity
        if: steps.changed.outputs.changed == 'true'
        run: |
          set -euo pipefail
          echo "=== Docker version ==="
          docker version
          echo "=== AWS identity ==="
          aws sts get-caller-identity

      - name: Login to Amazon ECR
        if: steps.changed.outputs.changed == 'true'
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: private
          mask-password: true
          skip-logout: false

      - name: Build & push ${{ matrix.name }}
        if: steps.changed.outputs.changed == 'true'
        run: |
          set -euo pipefail

          IMAGE_TAG="${GITHUB_SHA::7}"
          BASE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${{ matrix.ecr_repo }}"
          IMAGE_URI="${BASE_URI}:${IMAGE_TAG}"
          LATEST_URI="${BASE_URI}:latest"

          docker build \
            --platform linux/amd64 \
            --provenance=false \
            -f "${{ matrix.dockerfile }}" \
            -t "${IMAGE_URI}" .
          docker tag "${IMAGE_URI}" "${LATEST_URI}"
          docker push "${IMAGE_URI}"
          docker push "${LATEST_URI}"

          {
            echo "## ${{ matrix.name }} Build Summary"
            echo ""
            echo "**Commit**: \`${GITHUB_SHA}\`"
            echo "**Branch**: \`${GITHUB_REF_NAME}\`"
            echo "**ECR repo**: \`${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${{ matrix.ecr_repo }}\`"
            echo "**Image tag**: \`${IMAGE_TAG}\`"
            echo "**Image URI (sha)**: \`${IMAGE_URI}\`"
            echo "**Image URI (latest)**: \`${LATEST_URI}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Skipped — no relevant changes
        if: steps.changed.outputs.changed != 'true'
        run: echo "No changes detected for ${{ matrix.name }}, skipping build."

      - name: Docker cleanup
        if: always()
        run: |
          docker image prune -af || true
          docker builder prune -af || true

  # -------------------------------------------------------------------------
  # CI Summary: runs after all matrix builds, shows next steps for CD
  # -------------------------------------------------------------------------
  ci-summary:
    name: CI Summary & Next Steps
    runs-on: [self-hosted, cc3]
    needs: build-and-push
    if: always()
    steps:
      - name: Write CI summary
        run: |
          set -euo pipefail

          IMAGE_TAG="${GITHUB_SHA::7}"
          BASE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          CD_URL="${REPO_URL}/actions/workflows/cd-deploy.yml"

          {
            echo "## CI Build Summary"
            echo ""
            echo "**Commit**: \`${GITHUB_SHA}\`  |  **Branch**: \`${GITHUB_REF_NAME}\`  |  **Image tag**: \`${IMAGE_TAG}\`"
            echo ""
            echo "### Images built"
            echo "| Lambda | ECR repo | Image tag | Image URI |"
            echo "|--------|----------|-----------|-----------|"
            echo "| pdf-extractor | \`ieee-cc-pdf-extractor\` | \`${IMAGE_TAG}\` | \`${BASE_URI}/ieee-cc-pdf-extractor:${IMAGE_TAG}\` |"
            echo "| image-overlay | \`ieee-rc-image-generator\` | \`${IMAGE_TAG}\` | \`${BASE_URI}/ieee-rc-image-generator:${IMAGE_TAG}\` |"
            echo "| bedrock-inference | \`ieee-cc-bedrock-inference\` | \`${IMAGE_TAG}\` | \`${BASE_URI}/ieee-cc-bedrock-inference:${IMAGE_TAG}\` |"
            echo "| video-transcriber | \`ieee-cc-video-transcriber\` | \`${IMAGE_TAG}\` | \`${BASE_URI}/ieee-cc-video-transcriber:${IMAGE_TAG}\` |"
            echo "| ai-orchestrator | \`ieee-rc-ai-orchestrator\` | \`${IMAGE_TAG}\` | \`${BASE_URI}/ieee-rc-ai-orchestrator:${IMAGE_TAG}\` |"
            echo "| dlq-processor | \`ieee-rc-dlq-processor\` | \`${IMAGE_TAG}\` | \`${BASE_URI}/ieee-rc-dlq-processor:${IMAGE_TAG}\` |"
            echo "| bulk-processor | \`ieee-rc-bulk-processor\` | \`${IMAGE_TAG}\` | \`${BASE_URI}/ieee-rc-bulk-processor:${IMAGE_TAG}\` |"
            echo "| bulk-worker | \`ieee-rc-bulk-worker\` | \`${IMAGE_TAG}\` | \`${BASE_URI}/ieee-rc-bulk-worker:${IMAGE_TAG}\` |"
            echo "| wizard-transfer | \`ieee-rc-wizard-transfer\` | \`${IMAGE_TAG}\` | \`${BASE_URI}/ieee-rc-wizard-transfer:${IMAGE_TAG}\` |"
            echo "| pptx-extractor | \`ieee-rc-pptx-extractor\` | \`${IMAGE_TAG}\` | \`${BASE_URI}/ieee-rc-pptx-extractor:${IMAGE_TAG}\` |"
            echo ""
            echo "## Next Steps — CD Deploy"
            echo ""
            echo "Open the [DEV-CD-deploy](${REPO_URL}/actions/workflows/DEV-CD-deploy.yml), [STAGING-CD-deploy](${REPO_URL}/actions/workflows/STAGING-CD-deploy.yml), or [PROD-CD-deploy](${REPO_URL}/actions/workflows/PROD-CD-deploy.yml) workflow and use the tag \`${IMAGE_TAG}\` for each Lambda you want to deploy."
            echo ""
            echo "| Input field | Value to enter |"
            echo "|-------------|----------------|"
            echo "| pdf_extractor_tag | \`${IMAGE_TAG}\` |"
            echo "| image_overlay_tag | \`${IMAGE_TAG}\` |"
            echo "| bedrock_tag | \`${IMAGE_TAG}\` |"
            echo "| video_transcriber_tag | \`${IMAGE_TAG}\` |"
            echo "| ai_orchestrator_tag | \`${IMAGE_TAG}\` |"
            echo "| dlq_processor_tag | \`${IMAGE_TAG}\` |"
            echo "| bulk_processor_tag | \`${IMAGE_TAG}\` |"
            echo "| bulk_worker_tag | \`${IMAGE_TAG}\` |"
            echo "| wizard_transfer_tag | \`${IMAGE_TAG}\` |"
            echo "| pptx_extractor_tag | \`${IMAGE_TAG}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
