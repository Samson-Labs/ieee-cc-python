name: CD - Deploy to Lambda

on:
  workflow_dispatch:
    inputs:
      pdf_extractor_tag:
        description: "Image tag for pdf-extractor in ieee-cc-pdf-extractor (e.g. a1b2c3d or latest)"
        required: false
        type: string
      deploy_pdf_extractor:
        description: "Deploy pdf-extractor?"
        required: true
        default: "yes"
        type: choice
        options: ["yes", "no"]

      image_overlay_tag:
        description: "Image tag for image-overlay in ieee-rc-image-generator (e.g. a1b2c3d or latest)"
        required: false
        type: string
      deploy_image_overlay:
        description: "Deploy image-overlay?"
        required: true
        default: "yes"
        type: choice
        options: ["yes", "no"]

      bedrock_tag:
        description: "Image tag for bedrock-inference in ieee-cc-bedrock-inference (e.g. a1b2c3d or latest)"
        required: false
        type: string
      deploy_bedrock:
        description: "Deploy bedrock-inference?"
        required: true
        default: "yes"
        type: choice
        options: ["yes", "no"]

      video_transcriber_tag:
        description: "Image tag for video-transcriber in ieee-cc-video-transcriber (e.g. a1b2c3d or latest)"
        required: false
        type: string
      deploy_video_transcriber:
        description: "Deploy video-transcriber?"
        required: true
        default: "yes"
        type: choice
        options: ["yes", "no"]

      ai_orchestrator_tag:
        description: "Image tag for ai-orchestrator in ieee-rc-ai-orchestrator (e.g. a1b2c3d or latest)"
        required: false
        type: string
      deploy_ai_orchestrator:
        description: "Deploy ai-orchestrator?"
        required: true
        default: "yes"
        type: choice
        options: ["yes", "no"]

      dlq_processor_tag:
        description: "Image tag for dlq-processor in ieee-rc-dlq-processor (e.g. a1b2c3d or latest)"
        required: false
        type: string
      deploy_dlq_processor:
        description: "Deploy dlq-processor?"
        required: true
        default: "yes"
        type: choice
        options: ["yes", "no"]

      bulk_processor_tag:
        description: "Image tag for bulk-processor in ieee-rc-bulk-processor (e.g. a1b2c3d or latest)"
        required: false
        type: string
      deploy_bulk_processor:
        description: "Deploy bulk-processor?"
        required: true
        default: "yes"
        type: choice
        options: ["yes", "no"]

      bulk_worker_tag:
        description: "Image tag for bulk-worker in ieee-rc-bulk-worker (e.g. a1b2c3d or latest)"
        required: false
        type: string
      deploy_bulk_worker:
        description: "Deploy bulk-worker?"
        required: true
        default: "yes"
        type: choice
        options: ["yes", "no"]

concurrency:
  group: cd-deploy
  cancel-in-progress: false  # never cancel an in-flight deploy

jobs:
  deploy:
    name: Deploy Lambda functions
    runs-on: [self-hosted, cc3]
    if: github.event_name == 'workflow_dispatch'

    env:
      AWS_REGION: "us-east-1"
      AWS_DEFAULT_REGION: "us-east-1"
      ACCOUNT_ID: "141770997341"

      ECR_PDF_EXTRACTOR:    "ieee-cc-pdf-extractor"
      ECR_IMAGE_OVERLAY:    "ieee-rc-image-generator"
      ECR_BEDROCK:          "ieee-cc-bedrock-inference"
      ECR_VIDEO_TRANSCRIBER: "ieee-cc-video-transcriber"
      ECR_AI_ORCHESTRATOR:  "ieee-rc-ai-orchestrator"
      ECR_DLQ_PROCESSOR:    "ieee-rc-dlq-processor"
      ECR_BULK_PROCESSOR:   "ieee-rc-bulk-processor"
      ECR_BULK_WORKER:      "ieee-rc-bulk-worker"

      PDF_EXTRACTOR_TAG:     ${{ github.event.inputs.pdf_extractor_tag }}
      PDF_EXTRACTOR_FLAG:    ${{ github.event.inputs.deploy_pdf_extractor }}
      IMAGE_OVERLAY_TAG:     ${{ github.event.inputs.image_overlay_tag }}
      IMAGE_OVERLAY_FLAG:    ${{ github.event.inputs.deploy_image_overlay }}
      BEDROCK_TAG:           ${{ github.event.inputs.bedrock_tag }}
      BEDROCK_FLAG:          ${{ github.event.inputs.deploy_bedrock }}
      VIDEO_TRANSCRIBER_TAG: ${{ github.event.inputs.video_transcriber_tag }}
      VIDEO_TRANSCRIBER_FLAG: ${{ github.event.inputs.deploy_video_transcriber }}
      AI_ORCHESTRATOR_TAG:   ${{ github.event.inputs.ai_orchestrator_tag }}
      AI_ORCHESTRATOR_FLAG:  ${{ github.event.inputs.deploy_ai_orchestrator }}
      DLQ_PROCESSOR_TAG:     ${{ github.event.inputs.dlq_processor_tag }}
      DLQ_PROCESSOR_FLAG:    ${{ github.event.inputs.deploy_dlq_processor }}
      BULK_PROCESSOR_TAG:    ${{ github.event.inputs.bulk_processor_tag }}
      BULK_PROCESSOR_FLAG:   ${{ github.event.inputs.deploy_bulk_processor }}
      BULK_WORKER_TAG:       ${{ github.event.inputs.bulk_worker_tag }}
      BULK_WORKER_FLAG:      ${{ github.event.inputs.deploy_bulk_worker }}

    steps:
      - name: Start summary
        run: |
          set -euo pipefail

          base="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          {
            echo "## CD - Lambda Deployment"
            echo ""
            echo "**Branch**: \`${GITHUB_REF_NAME}\`  |  **Actor**: \`${{ github.actor }}\`"
            echo ""
            echo "### Inputs"
            echo "| Lambda | Deploy? | Tag | Image URI |"
            echo "|--------|---------|-----|-----------|"
            echo "| pdf-extractor | \`${PDF_EXTRACTOR_FLAG}\` | \`${PDF_EXTRACTOR_TAG:-<none>}\` | \`${base}/${ECR_PDF_EXTRACTOR}:${PDF_EXTRACTOR_TAG:-<none>}\` |"
            echo "| image-overlay | \`${IMAGE_OVERLAY_FLAG}\` | \`${IMAGE_OVERLAY_TAG:-<none>}\` | \`${base}/${ECR_IMAGE_OVERLAY}:${IMAGE_OVERLAY_TAG:-<none>}\` |"
            echo "| bedrock-inference | \`${BEDROCK_FLAG}\` | \`${BEDROCK_TAG:-<none>}\` | \`${base}/${ECR_BEDROCK}:${BEDROCK_TAG:-<none>}\` |"
            echo "| video-transcriber | \`${VIDEO_TRANSCRIBER_FLAG}\` | \`${VIDEO_TRANSCRIBER_TAG:-<none>}\` | \`${base}/${ECR_VIDEO_TRANSCRIBER}:${VIDEO_TRANSCRIBER_TAG:-<none>}\` |"
            echo "| ai-orchestrator | \`${AI_ORCHESTRATOR_FLAG}\` | \`${AI_ORCHESTRATOR_TAG:-<none>}\` | \`${base}/${ECR_AI_ORCHESTRATOR}:${AI_ORCHESTRATOR_TAG:-<none>}\` |"
            echo "| dlq-processor | \`${DLQ_PROCESSOR_FLAG}\` | \`${DLQ_PROCESSOR_TAG:-<none>}\` | \`${base}/${ECR_DLQ_PROCESSOR}:${DLQ_PROCESSOR_TAG:-<none>}\` |"
            echo "| bulk-processor | \`${BULK_PROCESSOR_FLAG}\` | \`${BULK_PROCESSOR_TAG:-<none>}\` | \`${base}/${ECR_BULK_PROCESSOR}:${BULK_PROCESSOR_TAG:-<none>}\` |"
            echo "| bulk-worker | \`${BULK_WORKER_FLAG}\` | \`${BULK_WORKER_TAG:-<none>}\` | \`${base}/${ECR_BULK_WORKER}:${BULK_WORKER_TAG:-<none>}\` |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Show AWS identity
        run: |
          set -euo pipefail
          aws sts get-caller-identity

      - name: Deploy Lambda functions
        id: deploy
        run: |
          set -euo pipefail

          RESULTS_FILE="deploy_results.txt"
          : > "$RESULTS_FILE"

          BASE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          deploy_lambda() {
            local ECR_REPO="$1"
            local LAMBDA_NAME="$2"
            local TAG="$3"
            local FLAG="$4"
            local LABEL="$5"

            if [[ "${FLAG}" == "no" ]]; then
              echo "${LABEL} -> SKIPPED (flag=no)" | tee -a "$RESULTS_FILE"
              return
            fi

            if [[ -z "${TAG:-}" ]]; then
              echo "ERROR: deploy flag is yes for ${LABEL} but tag is empty." >&2
              exit 1
            fi

            local IMAGE_URI="${BASE_URI}/${ECR_REPO}:${TAG}"
            echo "Deploying ${IMAGE_URI} → ${LAMBDA_NAME}"

            aws lambda update-function-code \
              --function-name "${LAMBDA_NAME}" \
              --region "${AWS_REGION}" \
              --image-uri "${IMAGE_URI}"

            echo "${LABEL} -> OK (tag=${TAG})" | tee -a "$RESULTS_FILE"
          }

          deploy_lambda "${ECR_PDF_EXTRACTOR}"     "ieee-cc-pdf-extractor"    "${PDF_EXTRACTOR_TAG:-}"     "${PDF_EXTRACTOR_FLAG}"     "pdf-extractor"
          deploy_lambda "${ECR_IMAGE_OVERLAY}"     "ieee-rc-image-generator"  "${IMAGE_OVERLAY_TAG:-}"     "${IMAGE_OVERLAY_FLAG}"     "image-overlay"
          deploy_lambda "${ECR_BEDROCK}"            "ieee-cc-bedrock-inference" "${BEDROCK_TAG:-}"          "${BEDROCK_FLAG}"           "bedrock-inference"
          deploy_lambda "${ECR_VIDEO_TRANSCRIBER}"  "ieee-cc-video-transcriber" "${VIDEO_TRANSCRIBER_TAG:-}" "${VIDEO_TRANSCRIBER_FLAG}" "video-transcriber"
          deploy_lambda "${ECR_AI_ORCHESTRATOR}"   "ieee-rc-ai-orchestrator"  "${AI_ORCHESTRATOR_TAG:-}"   "${AI_ORCHESTRATOR_FLAG}"   "ai-orchestrator"
          deploy_lambda "${ECR_DLQ_PROCESSOR}"     "ieee-rc-dlq-processor"    "${DLQ_PROCESSOR_TAG:-}"     "${DLQ_PROCESSOR_FLAG}"     "dlq-processor"
          deploy_lambda "${ECR_BULK_PROCESSOR}"    "ieee-rc-bulk-processor"   "${BULK_PROCESSOR_TAG:-}"    "${BULK_PROCESSOR_FLAG}"    "bulk-processor"
          deploy_lambda "${ECR_BULK_WORKER}"       "ieee-rc-bulk-worker"      "${BULK_WORKER_TAG:-}"       "${BULK_WORKER_FLAG}"       "bulk-worker"

          echo "RESULTS_FILE=${RESULTS_FILE}" >> "$GITHUB_ENV"

      - name: Write deployment summary
        if: always()
        run: |
          set -euo pipefail

          RESULTS_FILE="${RESULTS_FILE:-deploy_results.txt}"

          {
            echo "### Deployment Results"
            echo ""
            echo "| Lambda | Result |"
            echo "|--------|--------|"

            if [[ -f "${RESULTS_FILE}" ]]; then
              while IFS= read -r line; do
                LABEL=$(echo "${line}" | cut -d' ' -f1)
                STATUS=$(echo "${line}" | cut -d'>' -f2- | xargs)
                echo "| \`${LABEL}\` | ${STATUS} |"
              done < "${RESULTS_FILE}"
            else
              echo "| (none) | no results file found |"
            fi

            echo ""
            echo "> Deployment finished. Check the [Lambda console](https://us-east-1.console.aws.amazon.com/lambda/home?region=us-east-1#/functions) to verify."
          } >> "$GITHUB_STEP_SUMMARY"
