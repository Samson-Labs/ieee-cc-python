name: PROD CD - Promote + Deploy

on:
  workflow_dispatch:
    inputs:
      pdf_extractor_tag:
        description: "Tag in DEV ieee-cc-pdf-extractor to promote & deploy to PROD"
        required: false
        type: string
      promote_deploy_pdf_extractor:
        description: "Promote & deploy pdf-extractor?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

      video_transcriber_tag:
        description: "Tag in DEV ieee-cc-video-transcriber to promote & deploy to PROD"
        required: false
        type: string
      promote_deploy_video_transcriber:
        description: "Promote & deploy video-transcriber?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

      bedrock_inference_tag:
        description: "Tag in DEV ieee-cc-bedrock-inference to promote & deploy to PROD"
        required: false
        type: string
      promote_deploy_bedrock_inference:
        description: "Promote & deploy bedrock-inference?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

      ai_orchestrator_tag:
        description: "Tag in DEV ieee-rc-ai-orchestrator to promote & deploy to PROD"
        required: false
        type: string
      promote_deploy_ai_orchestrator:
        description: "Promote & deploy ai-orchestrator?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

      image_generator_tag:
        description: "Tag in DEV ieee-rc-image-generator to promote & deploy to PROD"
        required: false
        type: string
      promote_deploy_image_generator:
        description: "Promote & deploy image-generator?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

      dlq_processor_tag:
        description: "Tag in DEV ieee-rc-dlq-processor to promote & deploy to PROD"
        required: false
        type: string
      promote_deploy_dlq_processor:
        description: "Promote & deploy dlq-processor?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

jobs:
  promote-and-deploy:
    name: Promote DEV images to PROD ECR & deploy to PROD Lambdas
    runs-on: [self-hosted, lambda-builder]

    if: github.event_name == 'workflow_dispatch'

    env:
      AWS_REGION: us-east-1
      ACCOUNT_ID: "141770997341"

      # DEV ECR repos
      DEV_ECR_PDF_EXTRACTOR: "ieee-cc-pdf-extractor"
      DEV_ECR_VIDEO_TRANSCRIBER: "ieee-cc-video-transcriber"
      DEV_ECR_BEDROCK_INFERENCE: "ieee-cc-bedrock-inference"
      DEV_ECR_AI_ORCHESTRATOR: "ieee-rc-ai-orchestrator"
      DEV_ECR_IMAGE_GENERATOR: "ieee-rc-image-generator"
      DEV_ECR_DLQ_PROCESSOR: "ieee-rc-dlq-processor"

      # PROD ECR repos (create these for prod)
      PROD_ECR_PDF_EXTRACTOR: "prod-ieee-cc-pdf-extractor"
      PROD_ECR_VIDEO_TRANSCRIBER: "prod-ieee-cc-video-transcriber"
      PROD_ECR_BEDROCK_INFERENCE: "prod-ieee-cc-bedrock-inference"
      PROD_ECR_AI_ORCHESTRATOR: "prod-ieee-rc-ai-orchestrator"
      PROD_ECR_IMAGE_GENERATOR: "prod-ieee-rc-image-generator"
      PROD_ECR_DLQ_PROCESSOR: "prod-ieee-rc-dlq-processor"

      # PROD Lambda names (update when prod Lambdas are created)
      PROD_LAMBDA_PDF_EXTRACTOR: "prod-ieee-cc-pdf-extractor"
      PROD_LAMBDA_VIDEO_TRANSCRIBER: "prod-ieee-cc-video-transcriber"
      PROD_LAMBDA_BEDROCK_INFERENCE: "prod-ieee-cc-bedrock-inference"
      PROD_LAMBDA_AI_ORCHESTRATOR: "prod-ieee-rc-ai-orchestrator"
      PROD_LAMBDA_IMAGE_GENERATOR: "prod-ieee-rc-image-generator"
      PROD_LAMBDA_DLQ_PROCESSOR: "prod-ieee-rc-dlq-processor"

    steps:
      - name: Show AWS identity
        run: |
          set -euo pipefail
          echo "=== AWS identity ==="
          aws sts get-caller-identity

      - name: Start summary
        run: |
          set -euo pipefail

          {
            echo "### PROD Promotion and Deployment (DEV -> PROD)"
            echo ""
            echo "| Component | Promote & Deploy | DEV Tag |"
            echo "|-----------|-----------------|---------|"
            echo "| pdf-extractor | \`${{ inputs.promote_deploy_pdf_extractor }}\` | \`${{ inputs.pdf_extractor_tag || 'n/a' }}\` |"
            echo "| video-transcriber | \`${{ inputs.promote_deploy_video_transcriber }}\` | \`${{ inputs.video_transcriber_tag || 'n/a' }}\` |"
            echo "| bedrock-inference | \`${{ inputs.promote_deploy_bedrock_inference }}\` | \`${{ inputs.bedrock_inference_tag || 'n/a' }}\` |"
            echo "| ai-orchestrator | \`${{ inputs.promote_deploy_ai_orchestrator }}\` | \`${{ inputs.ai_orchestrator_tag || 'n/a' }}\` |"
            echo "| image-generator | \`${{ inputs.promote_deploy_image_generator }}\` | \`${{ inputs.image_generator_tag || 'n/a' }}\` |"
            echo "| dlq-processor | \`${{ inputs.promote_deploy_dlq_processor }}\` | \`${{ inputs.dlq_processor_tag || 'n/a' }}\` |"
            echo ""
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA::7}\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: private
          mask-password: true
          skip-logout: false

      - name: Promote from DEV ECR to PROD ECR and deploy to PROD Lambdas
        id: promote-deploy
        run: |
          set -euo pipefail

          IMAGE_RESULTS_FILE="prod_image_results.txt"
          LAMBDA_RESULTS_FILE="prod_lambda_results.txt"
          : > "$IMAGE_RESULTS_FILE"
          : > "$LAMBDA_RESULTS_FILE"

          ACCOUNT_BASE="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          promote_and_deploy() {
            local DEV_REPO="$1"
            local PROD_REPO="$2"
            local TAG="$3"
            local LAMBDA_NAME="$4"
            local COMPONENT="$5"
            local FLAG="$6"

            if [ "${FLAG}" = "no" ]; then
              echo "${COMPONENT}: SKIPPED (flag=no)"
              echo "${LAMBDA_NAME} -> SKIPPED(flag=no)" >> "$LAMBDA_RESULTS_FILE"
              return
            fi

            if [ -z "${TAG}" ]; then
              echo "ERROR: ${COMPONENT} promotion requested but tag is empty."
              exit 1
            fi

            echo ""
            echo "=== Processing: ${COMPONENT} (tag: ${TAG}) ==="

            local DEV_IMAGE_URI="${ACCOUNT_BASE}/${DEV_REPO}:${TAG}"
            local PROD_IMAGE_URI="${ACCOUNT_BASE}/${PROD_REPO}:${TAG}"
            local PROD_LATEST_URI="${ACCOUNT_BASE}/${PROD_REPO}:latest"

            echo "DEV image  : ${DEV_IMAGE_URI}"
            echo "PROD image : ${PROD_IMAGE_URI}"

            echo "Pulling from DEV ECR..."
            docker pull "${DEV_IMAGE_URI}"

            echo "Tagging for PROD ECR..."
            docker tag "${DEV_IMAGE_URI}" "${PROD_IMAGE_URI}"
            docker tag "${DEV_IMAGE_URI}" "${PROD_LATEST_URI}"

            echo "Pushing to PROD ECR..."
            docker push "${PROD_IMAGE_URI}"
            docker push "${PROD_LATEST_URI}"

            echo "${PROD_REPO} -> PROMOTED (tag=${TAG})" | tee -a "$IMAGE_RESULTS_FILE"

            echo "Updating PROD Lambda: ${LAMBDA_NAME}..."
            aws lambda update-function-code \
              --function-name "${LAMBDA_NAME}" \
              --image-uri "${PROD_IMAGE_URI}" \
              --region "${AWS_REGION}" \
              > /dev/null

            aws lambda wait function-updated-v2 \
              --function-name "${LAMBDA_NAME}" \
              --region "${AWS_REGION}"

            echo "${LAMBDA_NAME} -> OK (${TAG})" | tee -a "$LAMBDA_RESULTS_FILE"
          }

          promote_and_deploy "${DEV_ECR_PDF_EXTRACTOR}" "${PROD_ECR_PDF_EXTRACTOR}" \
            "${{ inputs.pdf_extractor_tag }}" "${PROD_LAMBDA_PDF_EXTRACTOR}" \
            "pdf-extractor" "${{ inputs.promote_deploy_pdf_extractor }}"

          promote_and_deploy "${DEV_ECR_VIDEO_TRANSCRIBER}" "${PROD_ECR_VIDEO_TRANSCRIBER}" \
            "${{ inputs.video_transcriber_tag }}" "${PROD_LAMBDA_VIDEO_TRANSCRIBER}" \
            "video-transcriber" "${{ inputs.promote_deploy_video_transcriber }}"

          promote_and_deploy "${DEV_ECR_BEDROCK_INFERENCE}" "${PROD_ECR_BEDROCK_INFERENCE}" \
            "${{ inputs.bedrock_inference_tag }}" "${PROD_LAMBDA_BEDROCK_INFERENCE}" \
            "bedrock-inference" "${{ inputs.promote_deploy_bedrock_inference }}"

          promote_and_deploy "${DEV_ECR_AI_ORCHESTRATOR}" "${PROD_ECR_AI_ORCHESTRATOR}" \
            "${{ inputs.ai_orchestrator_tag }}" "${PROD_LAMBDA_AI_ORCHESTRATOR}" \
            "ai-orchestrator" "${{ inputs.promote_deploy_ai_orchestrator }}"

          promote_and_deploy "${DEV_ECR_IMAGE_GENERATOR}" "${PROD_ECR_IMAGE_GENERATOR}" \
            "${{ inputs.image_generator_tag }}" "${PROD_LAMBDA_IMAGE_GENERATOR}" \
            "image-generator" "${{ inputs.promote_deploy_image_generator }}"

          promote_and_deploy "${DEV_ECR_DLQ_PROCESSOR}" "${PROD_ECR_DLQ_PROCESSOR}" \
            "${{ inputs.dlq_processor_tag }}" "${PROD_LAMBDA_DLQ_PROCESSOR}" \
            "dlq-processor" "${{ inputs.promote_deploy_dlq_processor }}"

          echo "IMAGE_RESULTS_FILE=${IMAGE_RESULTS_FILE}" >> "$GITHUB_ENV"
          echo "LAMBDA_RESULTS_FILE=${LAMBDA_RESULTS_FILE}" >> "$GITHUB_ENV"

      - name: Write deployment summary
        if: always()
        run: |
          set -euo pipefail

          IMAGE_RESULTS_FILE="${IMAGE_RESULTS_FILE:-prod_image_results.txt}"
          LAMBDA_RESULTS_FILE="${LAMBDA_RESULTS_FILE:-prod_lambda_results.txt}"

          {
            echo "### PROD Image Promotion"
            echo ""
            echo "| ECR Repo | Status |"
            echo "|----------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f "$IMAGE_RESULTS_FILE" ]; then
            while IFS= read -r line; do
              NAME=$(echo "$line" | cut -d' ' -f1)
              STATUS=$(echo "$line" | cut -d'>' -f2- | xargs)
              echo "| \`${NAME}\` | ${STATUS} |" >> "$GITHUB_STEP_SUMMARY"
            done < "$IMAGE_RESULTS_FILE"
          fi

          {
            echo ""
            echo "### PROD Lambda Deployment"
            echo ""
            echo "| Lambda Function | Status |"
            echo "|-----------------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -f "$LAMBDA_RESULTS_FILE" ]; then
            while IFS= read -r line; do
              NAME=$(echo "$line" | cut -d' ' -f1)
              STATUS=$(echo "$line" | cut -d'>' -f2- | xargs)
              echo "| \`${NAME}\` | ${STATUS} |" >> "$GITHUB_STEP_SUMMARY"
            done < "$LAMBDA_RESULTS_FILE"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> PROD deployment workflow finished." >> "$GITHUB_STEP_SUMMARY"
