name: CI - Test, Build & Push

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Test summary
        if: always()
        run: |
          {
            echo "### Test Results"
            echo ""
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA::7}\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

  build-push:
    name: Build & Push Docker Images
    needs: test
    if: github.event_name == 'push'
    runs-on: [self-hosted, lambda-builder]

    env:
      AWS_REGION: us-east-1
      ACCOUNT_ID: "141770997341"

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: pdf-extractor
            dockerfile: src/extractors/Dockerfile
            ecr_repo: ieee-cc-pdf-extractor
          - name: video-transcriber
            dockerfile: src/extractors/Dockerfile
            ecr_repo: ieee-cc-video-transcriber
          - name: bedrock-inference
            dockerfile: src/ai/Dockerfile
            ecr_repo: ieee-cc-bedrock-inference
          - name: ai-orchestrator
            dockerfile: src/orchestrator/AIOrchestratorDockerfile
            ecr_repo: ieee-rc-ai-orchestrator
          - name: image-generator
            dockerfile: src/generators/Dockerfile
            ecr_repo: ieee-rc-image-generator
          - name: dlq-processor
            dockerfile: src/dlq/Dockerfile
            ecr_repo: ieee-rc-dlq-processor

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: private
          mask-password: true

      - name: Build, tag & push image
        env:
          ECR_REPO: ${{ matrix.ecr_repo }}
          DOCKERFILE: ${{ matrix.dockerfile }}
          COMPONENT: ${{ matrix.name }}
        run: |
          set -euo pipefail

          IMAGE_TAG="${GITHUB_SHA::7}"
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}"

          echo "Building ${COMPONENT}..."
          docker buildx build --platform linux/amd64 --provenance=false \
            --output type=docker \
            -f "${DOCKERFILE}" \
            -t "${ECR_REPO}:${IMAGE_TAG}" .

          echo "Tagging..."
          docker tag "${ECR_REPO}:${IMAGE_TAG}" "${ECR_URI}:${IMAGE_TAG}"
          docker tag "${ECR_REPO}:${IMAGE_TAG}" "${ECR_URI}:latest"

          echo "Pushing ${ECR_URI}:${IMAGE_TAG}..."
          docker push "${ECR_URI}:${IMAGE_TAG}"
          docker push "${ECR_URI}:latest"

          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

          {
            echo "### Build: ${COMPONENT}"
            echo "- ECR: \`${ECR_URI}:${IMAGE_TAG}\`"
            echo "- Status: Pushed"
          } >> "$GITHUB_STEP_SUMMARY"
