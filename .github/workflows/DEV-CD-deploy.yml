name: Dev CD - Lambda Deploy

on:
  workflow_dispatch:
    inputs:
      pdf_extractor_tag:
        description: "Image tag for pdf-extractor (e.g. ee96758 or latest)"
        required: false
        type: string
      deploy_pdf_extractor:
        description: "Deploy pdf-extractor?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

      video_transcriber_tag:
        description: "Image tag for video-transcriber (e.g. ee96758 or latest)"
        required: false
        type: string
      deploy_video_transcriber:
        description: "Deploy video-transcriber?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

      bedrock_inference_tag:
        description: "Image tag for bedrock-inference (e.g. ee96758 or latest)"
        required: false
        type: string
      deploy_bedrock_inference:
        description: "Deploy bedrock-inference?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

      ai_orchestrator_tag:
        description: "Image tag for ai-orchestrator (e.g. ee96758 or latest)"
        required: false
        type: string
      deploy_ai_orchestrator:
        description: "Deploy ai-orchestrator?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

      image_generator_tag:
        description: "Image tag for image-generator (e.g. ee96758 or latest)"
        required: false
        type: string
      deploy_image_generator:
        description: "Deploy image-generator?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

      dlq_processor_tag:
        description: "Image tag for dlq-processor (e.g. ee96758 or latest)"
        required: false
        type: string
      deploy_dlq_processor:
        description: "Deploy dlq-processor?"
        required: true
        default: "no"
        type: choice
        options: ["yes", "no"]

jobs:
  deploy:
    name: Deploy images to DEV Lambda functions
    runs-on: [self-hosted, lambda-builder]

    if: github.event_name == 'workflow_dispatch'

    env:
      AWS_REGION: us-east-1
      ACCOUNT_ID: "141770997341"

    steps:
      - name: Show AWS identity
        run: |
          set -euo pipefail
          echo "=== AWS identity ==="
          aws sts get-caller-identity

      - name: Start summary
        run: |
          set -euo pipefail

          ECR_BASE="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          {
            echo "### DEV Lambda Deployment (CD)"
            echo ""
            echo "| Lambda | Deploy | Tag | Image URI |"
            echo "|--------|--------|-----|-----------|"
            echo "| pdf-extractor | \`${{ inputs.deploy_pdf_extractor }}\` | \`${{ inputs.pdf_extractor_tag || 'n/a' }}\` | \`${ECR_BASE}/ieee-cc-pdf-extractor:${{ inputs.pdf_extractor_tag || 'n/a' }}\` |"
            echo "| video-transcriber | \`${{ inputs.deploy_video_transcriber }}\` | \`${{ inputs.video_transcriber_tag || 'n/a' }}\` | \`${ECR_BASE}/ieee-cc-video-transcriber:${{ inputs.video_transcriber_tag || 'n/a' }}\` |"
            echo "| bedrock-inference | \`${{ inputs.deploy_bedrock_inference }}\` | \`${{ inputs.bedrock_inference_tag || 'n/a' }}\` | \`${ECR_BASE}/ieee-cc-bedrock-inference:${{ inputs.bedrock_inference_tag || 'n/a' }}\` |"
            echo "| ai-orchestrator | \`${{ inputs.deploy_ai_orchestrator }}\` | \`${{ inputs.ai_orchestrator_tag || 'n/a' }}\` | \`${ECR_BASE}/ieee-rc-ai-orchestrator:${{ inputs.ai_orchestrator_tag || 'n/a' }}\` |"
            echo "| image-generator | \`${{ inputs.deploy_image_generator }}\` | \`${{ inputs.image_generator_tag || 'n/a' }}\` | \`${ECR_BASE}/ieee-rc-image-generator:${{ inputs.image_generator_tag || 'n/a' }}\` |"
            echo "| dlq-processor | \`${{ inputs.deploy_dlq_processor }}\` | \`${{ inputs.dlq_processor_tag || 'n/a' }}\` | \`${ECR_BASE}/ieee-rc-dlq-processor:${{ inputs.dlq_processor_tag || 'n/a' }}\` |"
            echo ""
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Commit: \`${GITHUB_SHA::7}\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy images to DEV Lambda functions
        id: deploy
        run: |
          set -euo pipefail

          ECR_BASE="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          DEPLOY_RESULTS_FILE="deploy_results.txt"
          : > "$DEPLOY_RESULTS_FILE"

          deploy_lambda() {
            local FUNC_NAME="$1"
            local ECR_REPO="$2"
            local TAG="$3"
            local DEPLOY_FLAG="$4"
            local COMPONENT="$5"

            if [ "${DEPLOY_FLAG}" = "no" ]; then
              echo "${COMPONENT}: deployment SKIPPED (flag=no)"
              echo "${FUNC_NAME} -> SKIPPED(flag=no)" >> "$DEPLOY_RESULTS_FILE"
              return
            fi

            if [ -z "${TAG}" ]; then
              echo "ERROR: ${COMPONENT} deployment requested but tag is empty."
              exit 1
            fi

            local IMAGE_URI="${ECR_BASE}/${ECR_REPO}:${TAG}"
            echo "Deploying ${COMPONENT}: ${IMAGE_URI} -> ${FUNC_NAME}"

            aws lambda update-function-code \
              --function-name "${FUNC_NAME}" \
              --image-uri "${IMAGE_URI}" \
              --region "${AWS_REGION}" \
              > /dev/null

            aws lambda wait function-updated-v2 \
              --function-name "${FUNC_NAME}" \
              --region "${AWS_REGION}"

            echo "${FUNC_NAME} -> OK (${TAG})" | tee -a "$DEPLOY_RESULTS_FILE"
          }

          echo "Starting DEV deployments..."
          echo ""

          deploy_lambda "ieee-cc-pdf-extractor" "ieee-cc-pdf-extractor" \
            "${{ inputs.pdf_extractor_tag }}" "${{ inputs.deploy_pdf_extractor }}" "pdf-extractor"

          deploy_lambda "ieee-cc-video-transcriber" "ieee-cc-video-transcriber" \
            "${{ inputs.video_transcriber_tag }}" "${{ inputs.deploy_video_transcriber }}" "video-transcriber"

          deploy_lambda "ieee-cc-bedrock-inference" "ieee-cc-bedrock-inference" \
            "${{ inputs.bedrock_inference_tag }}" "${{ inputs.deploy_bedrock_inference }}" "bedrock-inference"

          deploy_lambda "ieee-rc-ai-orchestrator" "ieee-rc-ai-orchestrator" \
            "${{ inputs.ai_orchestrator_tag }}" "${{ inputs.deploy_ai_orchestrator }}" "ai-orchestrator"

          deploy_lambda "ieee-rc-image-generator" "ieee-rc-image-generator" \
            "${{ inputs.image_generator_tag }}" "${{ inputs.deploy_image_generator }}" "image-generator"

          deploy_lambda "ieee-rc-dlq-processor" "ieee-rc-dlq-processor" \
            "${{ inputs.dlq_processor_tag }}" "${{ inputs.deploy_dlq_processor }}" "dlq-processor"

          echo "DEPLOY_RESULTS_FILE=${DEPLOY_RESULTS_FILE}" >> "$GITHUB_ENV"

      - name: Write deployment summary
        if: always()
        run: |
          set -euo pipefail

          DEPLOY_RESULTS_FILE="${DEPLOY_RESULTS_FILE:-deploy_results.txt}"

          echo "### DEV Lambda Deployment Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lambda Function | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------------|--------|" >> "$GITHUB_STEP_SUMMARY"

          if [ -f "$DEPLOY_RESULTS_FILE" ]; then
            while IFS= read -r line; do
              NAME=$(echo "$line" | cut -d' ' -f1)
              STATUS=$(echo "$line" | cut -d'>' -f2- | xargs)
              echo "| \`${NAME}\` | ${STATUS} |" >> "$GITHUB_STEP_SUMMARY"
            done < "$DEPLOY_RESULTS_FILE"
          else
            echo "| (none) | (no results file) |" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> DEV deployment workflow finished." >> "$GITHUB_STEP_SUMMARY"
